    <nav class="navbar">

    <main class="contact-section">
        <div class="contact-wrapper">
            <div class="form-window">
                <div class="window-top-bar">
                 
                </div>
                <div class="window-content">
                    <div class="input-box">
                        <label>Name:</label>
                        <input type="text" placeholder="Enter your full name">
                    </div>
                    <div class="input-box">
                        <label>Mail:</label>
                        <input type="email" placeholder="Enter your mail id">
                    </div>
                    <div class="input-box">
                        <label>Message:</label>
                        <textarea placeholder="Enter your message"></textarea>
                    </div>
                    <button class="send-button">Send</button>
                </div>
            </div>

            <div class="contact-sidebar">
                <div class="sidebar-item">
                    <img src="img/fb.png" alt="FB" class="social-icon">
                    <span>Shane Cordero</span>
                </div>
                <div class="sidebar-item">
                    <img src="img/email.png" alt="Mail" class="social-icon">
                    <span>shanecrdr07@gmail.com</span>
                </div>
                <div class="sidebar-item">
                    <img src="img/tiktok.png" alt="TikTok" class="social-icon">
                    <span>@shncrdr</span>
                </div>
                <div class="sidebar-item">
                    <img src="img/whatsapp.png" alt="WhatsApp" class="social-icon">
                    <span>+639263612356</span>
                </div>
            </div>
        </div>
